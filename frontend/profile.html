<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - BloodConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-['Inter'] dark:bg-gray-900 dark:text-gray-100 flex h-screen overflow-hidden">

    <!-- Sidebar (Shared Dynamic Sidebar) -->
    <aside class="w-64 bg-white shadow-xl flex flex-col z-20 dark:bg-gray-800 transition-colors duration-300">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <svg class="h-8 w-8 text-primary" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" /></svg>
            <span class="ml-2 text-xl font-bold">BloodConnect</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <nav class="px-3 space-y-1" id="sidebar-nav">
                <!-- Navigation links will be injected by script.js correctly based on role -->
            </nav>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 dark:bg-gray-800 dark:border-b dark:border-gray-700 z-10 transition-colors duration-300">
            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Profile Settings</h1>
            <div class="flex items-center space-x-4">
                <div class="relative flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold"><span class="user-init">U</span></div>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200 user-name-display">User Name</span>
                    <button id="logout-btn" class="ml-4 text-sm font-medium text-red-600 hover:text-red-500">Logout</button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-gray-900 p-6">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 dark:bg-gray-800 dark:border-gray-700 overflow-hidden glass">
                    <div class="p-8 border-b border-gray-100 dark:border-gray-700 bg-gradient-to-r from-red-50 to-white dark:from-gray-800 dark:to-gray-800">
                        <div class="flex items-center space-x-4">
                            <div class="w-16 h-16 rounded-full bg-primary text-white flex items-center justify-center text-3xl font-bold shadow-lg">
                                <span class="user-init">U</span>
                            </div>
                            <div>
                                <h2 class="text-xl font-bold user-name-display">User Name</h2>
                                <p class="text-sm text-gray-500 capitalize" id="user-role-display">Loading...</p>
                            </div>
                        </div>
                    </div>

                    <form id="profile-form" class="p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Full Name</label>
                                <input type="text" id="name" required class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email Address (Read-only)</label>
                                <input type="email" id="email" readonly class="block w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-500 dark:bg-gray-800 dark:border-gray-700 cursor-not-allowed">
                            </div>
                            
                            <!-- Donor Specific Fields -->
                            <div class="donor-field hidden">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Date of Birth</label>
                                <input type="date" id="dob" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                            </div>
                            <div class="donor-field hidden">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Blood Group</label>
                                <select id="blood_group" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                                    <option value="A+">A+</option><option value="A-">A-</option>
                                    <option value="B+">B+</option><option value="B-">B-</option>
                                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                                    <option value="O+">O+</option><option value="O-">O-</option>
                                </select>
                            </div>

                            <!-- Phone (All roles) -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Phone Number</label>
                                <input type="tel" id="phone_number" required class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                            </div>

                            <!-- Hospital Specific -->
                            <div class="hospital-field hidden">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">License Number</label>
                                <input type="text" id="license_number" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                            </div>

                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Location / Address</label>
                                <input type="text" id="location" required class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                            </div>

                            <!-- Disease Info (Donor Only) -->
                            <div class="donor-field hidden">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Any Medical Conditions?</label>
                                <select id="disease_status" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                                    <option value="No">No</option>
                                    <option value="Yes">Yes</option>
                                </select>
                            </div>
                            <div id="disease-details-container" class="donor-field hidden">
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Condition Details</label>
                                <textarea id="disease_details" rows="2" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white"></textarea>
                            </div>
                        </div>

                        <div class="pt-4 flex justify-end">
                            <button type="submit" id="save-btn" class="px-6 py-2 bg-primary text-white rounded-lg font-bold hover:bg-red-700 transition shadow-md flex items-center">
                                <i class="fas fa-save mr-2"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            const form = document.getElementById('profile-form');
            const saveBtn = document.getElementById('save-btn');

            // 1. Setup Role Display
            document.getElementById('user-role-display').textContent = user.role;
            if (user.role === 'donor') {
                document.querySelectorAll('.donor-field').forEach(el => el.classList.remove('hidden'));
            } else if (user.role === 'hospital') {
                document.querySelectorAll('.hospital-field').forEach(el => el.classList.remove('hidden'));
            }

            // 2. Fetch Profile Data
            try {
                const profile = await apiFetch('/auth/profile');
                document.getElementById('name').value = profile.name;
                document.getElementById('email').value = profile.email;
                document.getElementById('location').value = profile.location || '';
                document.getElementById('phone_number').value = profile.phone_number || '';
                
                if (user.role === 'donor') {
                    document.getElementById('blood_group').value = profile.blood_group || 'A+';
                    if(profile.dob) {
                        const date = new Date(profile.dob);
                        document.getElementById('dob').value = date.toISOString().split('T')[0];
                    }
                    document.getElementById('disease_status').value = profile.disease_status || 'No';
                    document.getElementById('disease_details').value = profile.disease_details || '';
                } else if (user.role === 'hospital') {
                    document.getElementById('license_number').value = profile.license_number || '';
                }
            } catch (err) {
                alert('Error loading profile: ' + err.message);
            }

            // 3. Handle Update
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const formData = {
                    name: document.getElementById('name').value,
                    location: document.getElementById('location').value,
                    phone_number: document.getElementById('phone_number').value
                };

                if (user.role === 'donor') {
                    formData.blood_group = document.getElementById('blood_group').value;
                    formData.dob = document.getElementById('dob').value;
                    formData.disease_status = document.getElementById('disease_status').value;
                    formData.disease_details = document.getElementById('disease_details').value;
                } else if (user.role === 'hospital') {
                    formData.license_number = document.getElementById('license_number').value;
                }
                // Add camp specific fields if needed

                try {
                    saveBtn.disabled = true;
                    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';
                    
                    await apiFetch('/auth/profile', {
                        method: 'PUT',
                        body: JSON.stringify(formData)
                    });

                    // Update UI names
                    document.querySelectorAll('.user-name-display').forEach(el => el.textContent = formData.name);
                    alert('Profile updated successfully!');
                } catch (err) {
                    alert(err.message);
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i class="fas fa-save mr-2"></i> Save Changes';
                }
            });
        });
    </script>
</body>
</html>
