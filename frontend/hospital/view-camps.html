<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Camps - BloodConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#dc2626' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-['Inter'] dark:bg-gray-900 dark:text-gray-100 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-md dark:bg-gray-800 flex-shrink-0 flex flex-col transition-all duration-300 z-20">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <svg class="h-8 w-8 text-primary" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
            </svg>
            <span class="ml-2 text-xl font-bold">BloodConnect</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <nav class="space-y-1 px-3" id="sidebar-nav">
                <!-- Injected by script.js -->
            </nav>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 dark:bg-gray-800 dark:border-b dark:border-gray-700 z-10">
            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Nearby Donation Camps</h1>
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                    <span class="user-init">H</span>
                </div>
                <span class="user-name-display text-sm font-medium">Hospital Name</span>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-gray-900 p-6">
            <div class="mb-6 flex justify-between items-center">
                <p class="text-gray-500 dark:text-gray-400">Discover and connect with blood donation drives happening in your area.</p>
                <div class="flex bg-white dark:bg-gray-800 rounded-lg shadow-sm p-1 border border-gray-100 dark:border-gray-700">
                    <button class="px-4 py-1.5 text-xs font-bold rounded-md bg-gray-100 dark:bg-gray-700">All Camps</button>
                    <button class="px-4 py-1.5 text-xs font-bold rounded-md text-gray-500">Connected</button>
                </div>
            </div>

            <div id="camps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loaded dynamically -->
                <div class="col-span-full text-center py-20 text-gray-400 italic animate-pulse">Loading upcoming camps...</div>
            </div>
        </main>
    </div>
    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if(!user || user.role !== 'hospital') return;

            async function loadCamps() {
                try {
                    const camps = await apiFetch('/camps/events');
                    const grid = document.getElementById('camps-grid');
                    const upcomingCamps = camps.filter(c => c.status === 'upcoming');

                    if (upcomingCamps.length === 0) {
                        grid.innerHTML = `<div class="col-span-full py-20 bg-white dark:bg-gray-800 rounded-2xl border-2 border-dashed border-gray-100 dark:border-gray-700 text-center">
                            <i class="fas fa-campground text-gray-100 text-6xl mb-4"></i>
                            <p class="text-gray-400 font-medium">No donation camps found in your vicinity.</p>
                        </div>`;
                    } else {
                        grid.innerHTML = upcomingCamps.map(c => `
                            <div class="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl p-6 shadow-sm hover:shadow-xl transition-all group overflow-hidden relative">
                                <div class="absolute top-0 right-0 w-24 h-24 bg-red-50 dark:bg-red-900/10 rounded-bl-full -mr-8 -mt-8 -z-0"></div>
                                <div class="relative z-10">
                                    <div class="flex items-start justify-between mb-4">
                                        <div class="h-12 w-12 rounded-xl bg-red-50 text-primary flex items-center justify-center dark:bg-red-900/20">
                                            <i class="fas fa-campground text-xl"></i>
                                        </div>
                                        <div class="text-right">
                                            <span class="px-2 py-0.5 text-[9px] font-bold rounded bg-green-100 text-green-700 uppercase tracking-widest">Active</span>
                                        </div>
                                    </div>
                                    <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-1 group-hover:text-primary transition-colors">${c.title}</h3>
                                    <p class="text-xs text-gray-500 mb-4 line-clamp-2">${c.description || 'No description provided.'}</p>
                                    
                                    <div class="grid grid-cols-2 gap-4 mb-6">
                                        <div>
                                            <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Date & Time</p>
                                            <p class="text-xs font-bold">${new Date(c.date).toLocaleDateString()}</p>
                                            <p class="text-[10px] text-gray-500">${c.start_time} - ${c.end_time}</p>
                                        </div>
                                        <div>
                                            <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Max Capacity</p>
                                            <p class="text-xs font-bold">${c.max_donors} Donors</p>
                                        </div>
                                    </div>

                                    <div class="flex items-center text-xs text-gray-500 mb-6">
                                        <i class="fas fa-map-marker-alt text-primary mr-2"></i>
                                        <span class="truncate">${c.location}</span>
                                    </div>

                                    ${c.collab_status === 'pending' ? 
                                        `<button disabled class="w-full py-2.5 bg-gray-400 text-white text-xs font-bold rounded-xl shadow-lg uppercase tracking-widest cursor-not-allowed">Request Sent</button>` :
                                      c.collab_status === 'accepted' ?
                                        `<button disabled class="w-full py-2.5 bg-green-500 text-white text-xs font-bold rounded-xl shadow-lg uppercase tracking-widest cursor-not-allowed">Connected</button>` :
                                        `<button onclick="connectWithCamp(${c.id}, this)" class="w-full py-2.5 bg-primary text-white text-xs font-bold rounded-xl hover:bg-red-700 transition shadow-lg uppercase tracking-widest">
                                            Request Collaboration
                                        </button>`
                                    }
                                </div>
                            </div>
                        `).join('');
                    }
                } catch(e) {
                    console.error(e);
                }
            }

            window.connectWithCamp = async (id, btn) => {
                const message = prompt("Optional: Include a message for the camp organizer:", "We'd like to collaborate for blood collection.");
                if (message === null) return; // User cancelled

                try {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner animate-spin mr-2"></i> Sending...';
                    
                    await apiFetch('/camps/collaborations', {
                        method: 'POST',
                        body: JSON.stringify({
                            event_id: id,
                            message: message
                        })
                    });

                    btn.textContent = 'REQUEST SENT';
                    btn.className = "w-full py-2.5 bg-green-500 text-white text-xs font-bold rounded-xl shadow-md";
                    btn.onclick = null;
                    alert('Collaboration request sent! The camp organizer will be notified of your interest.');
                } catch (err) {
                    console.error(err);
                    alert('Error: ' + err.message);
                    btn.disabled = false;
                    btn.textContent = 'Request Collaboration';
                }
            };

            loadCamps();
        });
    </script>
</body>
</html>
