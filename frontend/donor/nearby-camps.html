<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Camps - BloodConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#dc2626' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-['Inter'] dark:bg-gray-900 dark:text-gray-100 flex h-screen overflow-hidden">
    <aside class="w-64 bg-white shadow-md dark:bg-gray-800 flex-shrink-0 flex flex-col transition-all duration-300 z-20">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <svg class="h-8 w-8 text-primary" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
            </svg>
            <span class="ml-2 text-xl font-bold">BloodConnect</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <nav class="space-y-1 px-3" id="sidebar-nav">
                <!-- Injected by script.js -->
            </nav>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 dark:bg-gray-800 dark:border-b dark:border-gray-700 z-10">
            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Nearby Donation Camps</h1>
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                    <span class="user-init">D</span>
                </div>
                <span class="user-name-display text-sm font-medium">Donor Name</span>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-gray-900 p-6">
            <div id="camps-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loaded dynamically -->
                <div class="col-span-full text-center py-20 text-gray-500 italic animate-pulse">Searching for scheduled donation camps...</div>
            </div>
        </main>
    </div>
    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if(!user || user.role !== 'donor') return;

            async function loadCamps() {
                try {
                    const camps = await apiFetch('/camps/events');
                    const list = document.getElementById('camps-list');
                    const upcomingCamps = camps.filter(c => c.status === 'upcoming');

                    if (upcomingCamps.length === 0) {
                        list.innerHTML = `<div class="col-span-full text-center py-20 bg-white dark:bg-gray-800 rounded-2xl border-2 border-dashed border-gray-100 dark:border-gray-700">
                            <i class="fas fa-campground text-gray-200 text-6xl mb-4"></i>
                            <p class="text-gray-400 font-medium">No donation camps scheduled nearby right now.</p>
                        </div>`;
                    } else {
                        list.innerHTML = upcomingCamps.map(camp => `
                            <div class="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl p-6 shadow-sm hover:shadow-xl transition-all">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="h-12 w-12 rounded-xl bg-red-50 text-primary flex items-center justify-center dark:bg-red-900/20">
                                        <i class="fas fa-campground text-xl"></i>
                                    </div>
                                    <span class="px-2 py-0.5 text-[10px] font-bold rounded bg-blue-100 text-blue-700 uppercase tracking-widest">Upcoming</span>
                                </div>
                                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">${camp.title}</h3>
                                <div class="space-y-2 mb-6">
                                    <p class="text-xs text-gray-500 flex items-center"><i class="fas fa-calendar-day w-5 opacity-60"></i> ${new Date(camp.date).toLocaleDateString()}</p>
                                    <p class="text-xs text-gray-500 flex items-center"><i class="fas fa-clock w-5 opacity-60"></i> ${camp.start_time} - ${camp.end_time}</p>
                                    <p class="text-xs text-gray-500 flex items-center"><i class="fas fa-map-marker-alt w-5 opacity-60"></i> ${camp.location}</p>
                                </div>
                                <button onclick="registerForCamp(${camp.id}, this)" class="w-full py-2 bg-primary text-white text-sm font-bold rounded-xl hover:bg-red-700 transition shadow-md">
                                    Register Now
                                </button>
                            </div>
                        `).join('');
                    }
                } catch(e) {
                    console.error(e);
                }
            }

            window.registerForCamp = async (id, btn) => {
                if(!confirm('Register for this blood donation camp?')) return;
                try {
                    btn.disabled = true;
                    btn.textContent = 'Registering...';
                    await apiFetch(`/camps/events/${id}/register`, { method: 'POST' });
                    btn.textContent = 'REGISTERED';
                    btn.classList.add('bg-green-500');
                    btn.classList.remove('bg-primary');
                    btn.onclick = null;
                    alert('Registration successful! Check your notification for details.');
                } catch (err) {
                    alert(err.message);
                    btn.disabled = false;
                    btn.textContent = 'Register Now';
                }
            };

            loadCamps();
        });
    </script>
</body>
</html>
