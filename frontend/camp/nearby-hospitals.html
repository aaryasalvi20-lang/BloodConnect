<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Hospitals - BloodConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#dc2626' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-['Inter'] dark:bg-gray-900 dark:text-gray-100 flex h-screen overflow-hidden">
    <aside class="w-64 bg-white shadow-md dark:bg-gray-800 flex-shrink-0 flex flex-col transition-all duration-300 z-20">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <svg class="h-8 w-8 text-primary" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
            </svg>
            <span class="ml-2 text-xl font-bold">BloodConnect</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <nav class="space-y-1 px-3" id="sidebar-nav">
            </nav>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 dark:bg-gray-800 dark:border-b dark:border-gray-700 z-10">
            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Nearby Hospitals</h1>
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                    <span class="user-init">C</span>
                </div>
                <span class="user-name-display text-sm font-medium">Camp Name</span>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-gray-900 p-6">
            <!-- Collaboration Requests Section -->
            <div class="mb-8">
                <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Collaboration Requests</h2>
                <div id="collab-requests-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-full py-10 bg-white dark:bg-gray-800 rounded-xl border-2 border-dashed border-gray-100 dark:border-gray-700 text-center text-gray-400 italic">
                        No pending collaboration requests.
                    </div>
                </div>
            </div>

            <!-- All Hospitals Section -->
            <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Nearby Hospitals</h2>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 dark:bg-gray-800 dark:border-gray-700 p-6">
                <div id="hospitals-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="text-center py-20 col-span-full text-gray-500">Searching for hospitals in your area...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if(!user || user.role !== 'camp') return;
            
            async function loadData() {
                try {
                    // Fetch Collaborations and Hospitals
                    const [hospitals, collaborations] = await Promise.all([
                        apiFetch('/donors/hospitals'), // Reusing hospital list from donor module
                        apiFetch('/camps/collaborations')
                    ]);

                    const collabList = document.getElementById('collab-requests-list');
                    const hostList = document.getElementById('hospitals-list');

                    // 1. Render Collaboration Requests (Pending)
                    const pending = collaborations.filter(c => c.status === 'pending');
                    if (pending.length === 0) {
                        collabList.innerHTML = `<div class="col-span-full py-10 bg-white dark:bg-gray-800 rounded-xl border-2 border-dashed border-gray-100 dark:border-gray-700 text-center text-gray-400 italic">No pending collaboration requests.</div>`;
                    } else {
                        collabList.innerHTML = pending.map(c => `
                            <div class="bg-white dark:bg-gray-800 border-l-4 border-primary rounded-xl p-5 shadow-sm">
                                <div class="flex items-center justify-between mb-4">
                                    <div class="flex items-center space-x-3">
                                        <div class="h-10 w-10 bg-primary/10 text-primary rounded-lg flex items-center justify-center">
                                            <i class="fas fa-hospital"></i>
                                        </div>
                                        <div>
                                            <p class="font-bold text-gray-900 dark:text-white">${c.hospital_name}</p>
                                            <p class="text-[10px] text-gray-500 font-bold uppercase">To: ${c.event_title}</p>
                                        </div>
                                    </div>
                                    <span class="text-[10px] text-gray-400">${new Date(c.created_at).toLocaleDateString()}</span>
                                </div>
                                <p class="text-xs text-gray-600 dark:text-gray-400 mb-4 bg-gray-50 dark:bg-gray-700/50 p-2 rounded italic">"${c.message || 'We would like to collaborate.'}"</p>
                                <div class="flex space-x-2">
                                    <button onclick="updateCollab(${c.id}, 'accepted')" class="flex-1 py-1.5 bg-green-500 text-white text-[10px] font-bold rounded-lg hover:bg-green-600 transition uppercase tracking-widest">Accept</button>
                                    <button onclick="updateCollab(${c.id}, 'rejected')" class="flex-1 py-1.5 bg-gray-200 text-gray-700 text-[10px] font-bold rounded-lg hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300 transition uppercase tracking-widest">Decline</button>
                                </div>
                            </div>
                        `).join('');
                    }

                    // 2. Render Hospital Directory
                    if (hospitals.length === 0) {
                        hostList.innerHTML = `<div class="text-center py-20 col-span-full text-gray-500">No hospitals found nearby.</div>`;
                    } else {
                        hostList.innerHTML = hospitals.map(h => `
                            <div class="bg-white dark:bg-gray-700 border border-gray-100 dark:border-gray-600 rounded-xl p-4 shadow-sm hover:shadow-md transition">
                                <div class="flex items-center space-x-3 mb-3">
                                    <div class="h-10 w-10 bg-primary/10 text-primary rounded-lg flex items-center justify-center">
                                        <i class="fas fa-hospital text-xl"></i>
                                    </div>
                                    <p class="font-bold text-gray-900 dark:text-white">${h.name}</p>
                                </div>
                                <p class="text-xs text-gray-500 mb-4 tracking-tight"><i class="fas fa-map-marker-alt mr-1 opacity-60"></i> ${h.location}</p>
                                <div class="flex items-center justify-between">
                                    <p class="text-[10px] text-gray-400 font-bold"><i class="fas fa-phone mr-1"></i> ${h.phone_number}</p>
                                    <button class="text-[10px] font-bold text-primary hover:underline">Contact</button>
                                </div>
                            </div>
                        `).join('');
                    }
                } catch(e) { console.error(e); }
            }

            window.updateCollab = async (id, status) => {
                try {
                    await apiFetch(`/camps/collaborations/${id}/status`, {
                        method: 'PUT',
                        body: JSON.stringify({ status })
                    });
                    loadData();
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            };

            loadData();
        });
    </script>
</body>
</html>
