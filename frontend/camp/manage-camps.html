<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Camps - BloodConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#dc2626' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-['Inter'] dark:bg-gray-900 dark:text-gray-100 flex h-screen overflow-hidden">
    <aside class="w-64 bg-white shadow-md dark:bg-gray-800 flex-shrink-0 flex flex-col transition-all duration-300 z-20">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <svg class="h-8 w-8 text-primary" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
            </svg>
            <span class="ml-2 text-xl font-bold">BloodConnect</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <nav class="space-y-1 px-3" id="sidebar-nav">
            </nav>
        </div>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <button id="theme-toggle" class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-200 dark:border-gray-600 transition">
                Toggle Theme
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 dark:bg-gray-800 dark:border-b dark:border-gray-700 z-10 transition-colors duration-300">
            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">Manage Your Camps</h1>
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                    <span class="user-init">C</span>
                </div>
                <span class="user-name-display text-sm font-medium">Camp Name</span>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-gray-900 p-6">
            <div class="max-w-5xl mx-auto">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 dark:bg-gray-800 dark:border-gray-700 p-6">
                    <div id="camps-list" class="space-y-4">
                        <div class="text-center py-20 text-gray-400">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto mb-4"></div>
                            <p>Loading your camp events...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if(!user || user.role !== 'camp') return;

            const listContainer = document.getElementById('camps-list');

            async function loadCamps() {
                try {
                    const camps = await apiFetch('/camps/events/my');
                    
                    if (camps.length === 0) {
                        listContainer.innerHTML = `
                            <div class="text-center py-20 text-gray-400">
                                <i class="fas fa-calendar-times text-5xl mb-4 opacity-20"></i>
                                <p>No camps organized yet.</p>
                                <a href="create-camp.html" class="text-primary font-bold mt-2 inline-block">Create your first camp event</a>
                            </div>
                        `;
                        return;
                    }

                    listContainer.innerHTML = camps.map(camp => `
                        <div class="flex flex-col md:flex-row items-center justify-between p-6 rounded-xl border border-gray-100 dark:border-gray-700 hover:shadow-md transition gap-4">
                            <div class="flex-1">
                                <div class="flex items-center space-x-3 mb-2">
                                    <h3 class="text-lg font-bold text-gray-900 dark:text-white">${camp.title}</h3>
                                    ${getStatusBadge(camp.status)}
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1 text-sm text-gray-500 dark:text-gray-400">
                                    <p><i class="fas fa-calendar mr-2 text-primary/60"></i> ${new Date(camp.date).toLocaleDateString()}</p>
                                    <p><i class="fas fa-clock mr-2 text-primary/60"></i> ${camp.start_time} - ${camp.end_time}</p>
                                    <p class="sm:col-span-2"><i class="fas fa-map-marker-alt mr-2 text-primary/60"></i> ${camp.location}</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-3">
                                <select onchange="updateStatus(${camp.id}, this.value)" class="text-xs border rounded px-2 py-1 dark:bg-gray-700 dark:border-gray-600">
                                    <option value="upcoming" ${camp.status === 'upcoming' ? 'selected' : ''}>Upcoming</option>
                                    <option value="live" ${camp.status === 'live' ? 'selected' : ''}>Live</option>
                                    <option value="completed" ${camp.status === 'completed' ? 'selected' : ''}>Completed</option>
                                </select>
                                <button onclick="viewDetails(${camp.id})" class="p-2 text-gray-400 hover:text-primary transition"><i class="fas fa-eye"></i></button>
                                <button class="p-2 text-gray-400 hover:text-primary transition"><i class="fas fa-edit"></i></button>
                            </div>
                        </div>
                    `).join('');
                } catch (err) {
                    listContainer.innerHTML = `<p class="text-center text-red-500 py-10">${err.message}</p>`;
                }
            }

            window.updateStatus = async (id, status) => {
                try {
                    await apiFetch(`/camps/events/${id}/status`, {
                        method: 'PUT',
                        body: JSON.stringify({ status })
                    });
                    loadCamps();
                } catch (err) {
                    alert('Error updating status: ' + err.message);
                }
            };

            function getStatusBadge(status) {
                const styles = {
                    upcoming: 'bg-blue-100 text-blue-700 border-blue-200',
                    live: 'bg-green-100 text-green-700 border-green-200 animate-pulse',
                    completed: 'bg-gray-100 text-gray-700 border-gray-200'
                };
                return `<span class="px-2 py-0.5 text-[10px] font-bold rounded border uppercase ${styles[status] || styles.upcoming}">${status}</span>`;
            }

            loadCamps();
        });
    </script>
</body>
</html>
